name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build WPF app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore QuickTools.csproj

      - name: Build
        run: dotnet build QuickTools.csproj --configuration Release --no-restore /p:SourceRevisionId=${{ github.sha }}

      - name: Publish win-x64
        run: dotnet publish QuickTools.csproj --configuration Release --runtime win-x64 --self-contained true --output publish/QuickTools /p:SourceRevisionId=${{ github.sha }}

      - name: Sign executable
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.QUICKTOOLS_SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.QUICKTOOLS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:SIGNING_CERT_PASSWORD)) {
            Write-Host "Signing certificate secrets are not configured. Skipping signing."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "quicktools-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SIGNING_CERT_BASE64))
          & signtool sign /f $certPath /p $env:SIGNING_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 publish/QuickTools/QuickTools.exe
          Remove-Item $certPath -Force

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish/QuickTools/* -DestinationPath QuickTools-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTools-win-x64
          path: QuickTools-win-x64.zip

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: QuickTools latest
          body: |
            Latest QuickTools build from `${{ github.sha }}`.

            Download `QuickTools-win-x64.zip`, extract it, and run `QuickTools.exe`.

            If Windows SmartScreen blocks the app, it means the executable is not trusted on that PC yet. Signing releases with a code-signing certificate reduces this warning.
          artifacts: QuickTools-win-x64.zip
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          commit: ${{ github.sha }}
